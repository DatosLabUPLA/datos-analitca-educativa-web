<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jornadas Nacionales de Educación Matemática 2026 — Difusion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>{css}</style>
</head>
<body>
{math_bg}
{body_html}
{scripts}
<script>
function sendHeight() {
  parent.postMessage({ type: "resize", height: document.body.scrollHeight }, "*");
}
window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
window.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll(".comite-nav a").forEach(link => {
    link.addEventListener("click", function (e) {
      e.preventDefault();
      const targetId = this.dataset.target;
      const section = document.getElementById(targetId);
      if (section) {
        const rect = section.getBoundingClientRect();
        parent.postMessage({ type: "scrollToSection", offset: rect.top }, "*");
      }
    });
  });
});
</script>
<script>
if (window.self !== window.top) {
    var style = document.createElement('style');
    style.textContent = '.math-bg { position: absolute !important; } body { position: relative; min-height: 100%; }';
    document.head.appendChild(style);
}
</script>
</body>
</html>
